name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests (the gate)
        run: ./gradlew :feature-flags:testDebugUnitTest

      - name: Lint
        run: ./gradlew :feature-flags:lint

      - name: Assemble release AAR
        run: ./gradlew :feature-flags:assembleRelease

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: feature-flags/build/reports/
          if-no-files-found: ignore
