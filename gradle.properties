org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is required.
android.useAndroidX=true
# Kotlin code style: "official".
kotlin.code.style=official
# Each library's R class includes only its own resources.
android.nonTransitiveRClass=true
# Required so the Kotlin Android plugin compiles Kotlin sources in the testFixtures source set
# (FakeFeatureFlags lives in feature-flags/src/testFixtures). Without it those files are silently
# skipped and the fixtures jar ships empty.
android.experimental.enableTestFixturesKotlinSupport=true
